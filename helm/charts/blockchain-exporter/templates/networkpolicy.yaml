{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "blockchain-exporter.fullname" . }}
  labels:
    {{- include "blockchain-exporter.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "blockchain-exporter.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow scrapes/probes to the health and metrics ports. Restrict the source
    # by setting networkPolicy.ingress.from (e.g. the Prometheus namespace).
    - ports:
        - port: {{ .Values.service.healthPort }}
          protocol: TCP
        - port: {{ .Values.service.metricsPort }}
          protocol: TCP
      {{- with .Values.networkPolicy.ingress.from }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  egress:
    # DNS resolution.
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Outbound RPC. Defaults to HTTPS anywhere; override networkPolicy.egress to
    # pin specific endpoints/ports.
    {{- with .Values.networkPolicy.egress }}
    {{- toYaml . | nindent 4 }}
    {{- else }}
    - ports:
        - port: 443
          protocol: TCP
    {{- end }}
{{- end }}
