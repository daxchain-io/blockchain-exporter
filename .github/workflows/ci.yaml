name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  release:
    types: [ published ]  # Trigger on published releases (includes tag creation)

# Least privilege by default; the build-and-push job widens this as needed.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry==2.4.1

      - name: Install dependencies
        run: poetry install --with dev

      - name: Lint (Python)
        run: poetry run ruff check .

      - name: Lint (Markdown)
        run: poetry run mdformat --wrap=keep --check README.md CLAUDE.md

      - name: Lint (Dockerfile)
        run: docker run --rm -i hadolint/hadolint < Dockerfile

      - name: Type check
        run: poetry run mypy src/blockchain_exporter

      - name: Audit dependencies
        run: poetry run pip-audit

      - name: Tests
        run: poetry run pytest
        env:
          PYTHONPATH: ${{ github.workspace }}/src

      - name: Validate config
        run: poetry run python -m blockchain_exporter.cli --config config.toml
        env:
          PYTHONPATH: ${{ github.workspace }}/src

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage
          path: coverage.xml

  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: read
      packages: write
      id-token: write  # keyless cosign signing + build attestations

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/images/blockchain-exporter
          tags: |
            type=raw,value=${{ github.event.release.tag_name || github.ref_name }}
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name || github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name || github.ref_name }}
            type=semver,pattern={{major}},value=${{ github.event.release.tag_name || github.ref_name }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max  # SLSA build provenance attestation
          sbom: true            # SBOM attestation

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/images/blockchain-exporter@${{ steps.build.outputs.digest }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true  # only fail on vulnerabilities that have a fix
          exit-code: "1"

      - name: Sign image (keyless)
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/images/blockchain-exporter
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: 'latest'

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            # Extract version from release tag (remove 'v' prefix if present)
            VERSION=${{ github.event.release.tag_name }}
            VERSION=${VERSION#v}
          else
            # Extract version from tag ref (remove 'refs/tags/v' prefix)
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION"

      - name: Package Helm chart
        working-directory: helm/charts/blockchain-exporter
        run: |
          # Temporarily update image tag to release version for packaging
          sed -i.bak "s/^  tag: .*/  tag: \"${{ steps.version.outputs.version }}\"/" values.yaml
          helm package . \
            --version ${{ steps.version.outputs.version }} \
            --app-version ${{ steps.version.outputs.version }}
          CHART_FILE=$(ls blockchain-exporter-*.tgz)
          echo "CHART_FILE=helm/charts/blockchain-exporter/$CHART_FILE" >> "$GITHUB_ENV"
          # Restore original values.yaml
          mv values.yaml.bak values.yaml

      - name: Configure Helm for OCI
        run: |
          helm registry login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

      - name: Push Helm chart to OCI registry
        run: |
          helm push "${{ env.CHART_FILE }}" oci://ghcr.io/${{ github.repository_owner }}/helm-charts
